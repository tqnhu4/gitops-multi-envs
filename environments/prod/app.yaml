apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: webapp-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/company/gitops-platform
    targetRevision: HEAD
    path: apps/webapp
    helm:
      valueFiles:
        - ../../environments/prod/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true